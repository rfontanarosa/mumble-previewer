<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMBLE-PREVIEWER</title>
    <link rel="stylesheet" href="dist/css/styles.css">
    <script src="dist/index.js"></script>
  </head>
  <body>
    <h1>MUMBLE-PREVIEWER</h1>
    <div style="margin-bottom: 1rem;">
      Source: <a href="https://github.com/rfontanarosa/mumble-previewer" target="_blank">https://github.com/rfontanarosa/mumble-previewer/</a>
    </div>
    <script>
      const containerId = "preview-container";
      let text = "This is a test!";
      let config = "";
    </script>
    <div style="margin-bottom: 1rem;">
      <select id="game-select">
        <option value="">-- Select a game --</option>
        <optgroup label="Super Nintendo (SNES)">
          <option value="7thsaga">7th Saga, The (SNES)</option>
          <option value="7thsaga_it">7th Saga, The (SNES) - Italian</option>
          <option value="alcahest">Alcahest (SNES)</option>
          <option value="alcahest_it">Alcahest (SNES) - Italian</option>
          <option value="brainlord">Brain Lord (SNES)</option>
          <option value="brainlord_it">Brain Lord (SNES) - Italian</option>
          <option value="brainlord_pt">Brain Lord (SNES) - Portuguese</option>
          <option value="bof">Breath of Fire (SNES)</option>
          <option value="ffmq">Final Fantasy: Mystic Quest (SNES)</option>
          <option value="ignition">Ignition Factor, The (SNES)</option>
          <option value="gaia">Illusion of Gaia (SNES)</option>
          <option value="lufia">Lufia &amp; the Fortress of Doom (SNES)</option>
          <option value="neugier">Neugier: Umi to Kaze no Koudou (SNES)</option>
          <option value="soe">Secret of Evermore (SNES) - English</option>
          <option value="soe_it">Secret of Evermore (SNES) - Italian</option>
          <option value="soe_pt">Secret of Evermore (SNES) - Portuguese</option>
          <option value="som">Secret of Mana (SNES) - English</option>
          <option value="som_it">Secret of Mana (SNES) - Italian</option>
          <option value="sd3">Seiken Densetsu 3 (SNES)</option>
          <option value="smrpg">Super Mario RPG: Legend of the Seven Stars (SNES)</option>
          <option value="starocean">Star Ocean (SNES)</option>
          <option value="starocean_it">Star Ocean (SNES) - Italian</option>
          <option value="spike">Twisted Tales of Spike McFang, The (SNES)</option>
          <option value="ys3">Ys III: Wanderers from Ys (SNES)</option>
        </optgroup>
        <optgroup label="PlayStation (PSX)">
          <option value="lom">Legend of Mana (PSX)</option>
          <option value="mmlegends">Mega Man Legends (PSX)</option>
          <option value="valkyrie">Valkyrie Profile (PSX)</option>
        </optgroup>
      </select>
    </div>
    <div style="margin-bottom: 1rem;">
      <textarea id="text-input">This is a test!</textarea>
    </div>
    <div id="preview-container"></div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const containerId = "preview-container";
        const gameSelect = document.getElementById('game-select');
        const textInput = document.getElementById('text-input');

        const updatePreview = () => {
          const text = textInput.value;
          const config = gameSelect.value;
          if (window.MumblePreviewer) {
            MumblePreviewer.renderPreview(containerId, text, config);
          }
        };

        gameSelect.addEventListener('change', updatePreview);
        textInput.addEventListener('input', updatePreview);

        updatePreview();
      });
    </script>
  </body>
</html>
